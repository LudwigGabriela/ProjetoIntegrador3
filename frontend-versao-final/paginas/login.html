<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VetTrace - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #43054E;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: #000000;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
            color: white;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .logo-icon {
            width: 3rem;
            height: 3rem;
            color: white;
        }

        .logo-text {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
        }

        .subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .login-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px;
            border-radius: 0.75rem;
            /* ~12px */
            padding: 2.5rem;
            /* ~40px */
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .card-header h2 {
            font-size: 1.5rem;
            /* 24px */
            font-weight: 800;
            color: #43054E;
            margin-bottom: 0.5rem;
        }

        .card-header p {
            color: #6b7280;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            /* 14px */
            font-weight: 700;
            color: #374151;
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .field-icon {
            position: absolute;
            left: 1rem;
            width: 1.125rem;
            height: 1.125rem;
            color: #9ca3af;
        }

        .form-control {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 0.5rem;
            font-family: inherit;
            font-size: 0.9375rem;
            outline: none;
            transition: all 0.2s;
            background-color: #F3F4F6;
        }

        .form-control:focus {
            border-color: #43054E;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(67, 5, 78, 0.05);
        }

        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .checkbox-group input {
            width: 1.125rem;
            height: 1.125rem;
            border: 1.5px solid #d1d5db;
            border-radius: 0.25rem;
            cursor: pointer;
            accent-color: #A62B69;
        }

        .checkbox-group label {
            font-size: 0.875rem;
            color: #4b5563;
            font-weight: 500;
            cursor: pointer;
        }

        .forgot-link {
            font-size: 0.875rem;
            color: #A62B69;
            text-decoration: none;
            font-weight: 700;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .btn-entrar {
            width: 100%;
            padding: 1rem;
            background-color: #A62B69;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(166, 43, 105, 0.2);
            margin-bottom: 2rem;
        }

        .btn-entrar:hover {
            background-color: #A62B69;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(166, 43, 105, 0.3);
        }

        .card-footer {
            text-align: center;
            font-size: 0.9375rem;
            color: #6b7280;
            font-weight: 500;
        }

        .card-footer a {
            color: #A62B69;
            text-decoration: none;
            font-weight: 800;
        }

        .card-footer a:hover {
            text-decoration: underline;
        }

        .copyright {
            margin-top: 3rem;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8125rem;
            font-weight: 500;
            text-align: center;
        }
    </style>
</head>

<body>

    <header class="login-header">
        <div class="logo-container">
            <img src="../assets/logo-vet-trace.png" alt="Logo" style="height: 60px; width: auto; margin-right: 1rem;">
            <h1 class="logo-text">VetTrace</h1>
        </div>
        <p class="subtitle">Sistema de Rastreabilidade Clínica</p>
    </header>

    <div class="login-card">
        <div class="card-header">
            <h2>Bem-vindo de volta</h2>
            <p>Entre com suas credenciais para acessar o sistema</p>
        </div>

        <form id="form-login">
            <div class="form-group">
                <label class="form-label">E-mail</label>
                <div class="input-wrapper">
                    <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                    <input type="email" class="form-control" id="form-login-input-email" placeholder="seu@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Senha</label>
                <div class="input-wrapper">
                    <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <input type="password" class="form-control" id="form-login-input-senha" placeholder="••••••••" required>
                </div>
            </div>

            <div class="controls-row">
                <div class="checkbox-group">
                    <input type="checkbox" id="remember">
                    <label for="remember">Lembrar-me</label>
                </div>
                <a href="#" class="forgot-link">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="btn-entrar">ENTRAR</button>

            <div class="card-footer">
                Não tem uma conta? <a href="cadastro.html">Cadastre-se</a>
            </div>
        </form>
    </div>

    <footer class="copyright">
        © 2026 VetTrace. Projeto Integrador III.
    </footer>

    <script src="../js/login.js"></script>

</body>

</html>
